<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See Ya Bar - 櫃檯接單與後結帳系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0c0a09; color: #e7e5e4; font-family: sans-serif; }
    .active-tab { border-bottom: 3px solid #f59e0b; color: #f59e0b; font-weight: bold; }
    .neon-card { border: 1px solid rgba(217, 119, 6, 0.15); background: rgba(28, 25, 23, 0.6); transition: all 0.2s ease; }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

  <header class="flex justify-between items-center border-b border-stone-800 pb-4 mb-6">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🍹</span>
      <div>
        <h1 class="text-xl font-black text-amber-500 tracking-widest">See Ya Bar</h1>
        <p class="text-xs text-stone-500">智慧控盤中樞</p>
      </div>
    </div>
    <nav class="flex gap-6 text-sm">
      <button id="tab-kds" class="py-2 px-1 active-tab transition" onclick="switchTab('kds')">📋 出單現況總覽</button>
      <button id="tab-pos" class="py-2 px-1 text-stone-400 hover:text-amber-400 transition" onclick="switchTab('pos')">💰 桌況後結帳系統</button>
    </nav>
  </header>

  <!-- ==================== 面板一：出單現況總覽 ==================== -->
  <section id="panel-kds" class="block space-y-4">
    <div class="flex justify-between items-center">
      <h2 class="text-md font-bold text-stone-400 flex items-center gap-2">⏳ 吧台待出餐品項 (勾選即完成)</h2>
      <span id="kds-count" class="text-xs bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full">0 份未出</span>
    </div>
    <div id="kds-list" class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
      <div class="text-stone-500 italic text-sm">正在從 Google 大腦載入最新鮮的吧台數據...</div>
    </div>
  </section>

  <!-- ==================== 面板二：桌況後結帳系統 ==================== -->
  <section id="panel-pos" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1 space-y-3">
      <h2 class="text-md font-bold text-stone-400">📍 請選擇結帳桌號</h2>
      <div id="table-buttons-grid" class="grid grid-cols-3 gap-2"></div>
    </div>

    <div class="lg:col-span-2 bg-stone-900/90 rounded-2xl p-6 border border-stone-800 flex flex-col justify-between min-h-[450px]">
      <div>
        <div class="flex justify-between items-center border-b border-stone-800 pb-3 mb-4">
          <h3 class="text-lg font-bold flex items-center gap-2 text-amber-400">
            <span>🧾 帳單明細 -</span> <span id="current-selected-table">未選擇桌號</span>
          </h3>
          <span id="billing-status-badge" class="text-xs px-2 py-0.5 rounded-full bg-stone-800 text-stone-500">請先選桌</span>
        </div>
        <div id="table-bill-items" class="space-y-3 max-h-[280px] overflow-y-auto pr-2 text-sm">
          <p class="text-stone-500 italic text-center py-12">請點擊左側桌號按鈕，系統將自動合併今日所有追點帳單金額。</p>
        </div>
      </div>

      <div class="border-t border-stone-800 pt-4 mt-4 space-y-4">
        <div class="flex justify-between items-center px-2">
          <span class="text-sm text-stone-400">今日累計總應收</span>
          <span id="table-bill-total" class="text-2xl font-black text-amber-500">NT$ 0</span>
        </div>
        <div class="grid grid-cols-2 gap-3" id="action-buttons-zone">
          <button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">現金收款結帳</button>
          <button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">招待 Bye-bye Shot</button>
        </div>
        <p id="time-log-display" class="text-center text-xs text-stone-500 italic"></p>
      </div>
    </div>
  </section>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyf2aQgkaeLuzpONrc3RzegFMRqXtfgucDMhXs_sXxBH4J2YnqUXr4GgnIB7LV2JO_N8A/exec";

    const tableList = [
      "A1", "A2", "A3", "A4", "B1", "B2", "B3", "B4", "C1", "C2", "C3", "C4",
      "吧台1", "吧台2", "吧台3", "吧台4", "吧台5", "吧台6", "吧台7", "吧台8", "吧 pull9", "吧台10", "散客"
    ];

    // 重新校正對齊官方 23 桌，防範拼字不對齊
    const officialTableNames = [
      "A1", "A2", "A3", "A4", "B1", "B2", "B3", "B4", "C1", "C2", "C3", "C4",
      "吧台1", "吧台2", "吧台3", "吧台4", "吧台5", "吧台6", "吧台7", "吧台8", "吧台9", "吧台10", "散客"
    ];

    let allOrders = [];
    let activeTable = "";
    let isFetching = false;

    function switchTab(tab) {
      document.getElementById('panel-kds').className = tab === 'kds' ? 'block space-y-4' : 'hidden';
      document.getElementById('panel-pos').className = tab === 'pos' ? 'grid grid-cols-1 lg:grid-cols-3 gap-6' : 'hidden';
      document.getElementById('tab-kds').className = tab === 'kds' ? 'py-2 px-1 active-tab transition' : 'py-2 px-1 text-stone-400 hover:text-amber-400 transition';
      document.getElementById('tab-pos').className = tab === 'pos' ? 'py-2 px-1 active-tab transition' : 'py-2 px-1 text-stone-400 hover:text-amber-400 transition';
    }

    function initTableButtons() {
      const grid = document.getElementById('table-buttons-grid');
      grid.innerHTML = officialTableNames.map(t => `
        <button id="btn-table-${t}" onclick="selectTable('${t}')" 
                class="py-3 text-sm font-bold rounded-xl border border-stone-800 bg-stone-900/40 text-stone-400 hover:border-amber-500/50 hover:text-amber-400 transition">
          ${t}
        </button>
      `).join('');
    }

    async function refreshData() {
      if (isFetching) return;
      try {
        isFetching = true;
        const urlWithBuster = API_URL + "?_ts=" + new Date().getTime();
        const res = await fetch(urlWithBuster, { method: "GET" });
        allOrders = await res.json();
        
        if (Array.isArray(allOrders)) {
          renderKDS();
          if (activeTable) renderTableBill(activeTable);
          updateTableStatusBadges();
        }
      } catch (e) { console.error("背景讀取同步中...", e); }
      finally { isFetching = false; }
    }

    function renderKDS() {
      const kdsList = document.getElementById('kds-list');
      const unfulfilled = allOrders.filter(o => o && o.cook === "未出單" && o.table && o.table.trim() !== "" && o.status !== "已取消");
      
      document.getElementById('kds-count').textContent = `${unfulfilled.length} 份未出`;
      
      if (unfulfilled.length === 0) {
        kdsList.innerHTML = `<div class="col-span-3 py-12 text-center text-stone-500 italic text-sm">🎉 所有酒水餐點均已出單完畢！吧台手可以休息一下～</div>`;
        return;
      }

      kdsList.innerHTML = unfulfilled.map(o => {
        let displayTime = "剛才";
        if (o.time && o.time.includes(' ')) displayTime = o.time.split(' ')[1];

        return `
        <div id="kds-card-${o.row}" class="neon-card p-4 rounded-xl flex justify-between items-center border border-stone-800">
          <div class="min-w-0 flex-1 pr-2">
            <div class="flex items-center gap-2">
              <span class="bg-amber-500 text-stone-950 text-xs font-black px-1.5 py-0.5 rounded flex-shrink-0">${o.table}</span>
              <span class="text-xs text-stone-500 truncate">${displayTime}</span>
            </div>
            <p class="text-md font-bold mt-2 text-stone-200 truncate">${o.item || "未知品項"}</p>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <button onclick="cancelSingleOrder(${o.row})" 
                    class="px-2.5 py-1.5 rounded-lg border border-red-500/40 text-red-400 hover:bg-red-600 hover:text-white transition text-xs font-bold">
              ✕ 取消
            </button>
            <button onclick="changeStatus(${o.row}, 'cook_status', '已出單')" 
                    class="w-8 h-8 rounded-full border border-green-500/40 bg-green-950/20 text-green-400 flex items-center justify-center hover:bg-green-500 hover:text-stone-950 transition text-sm">
              ✓
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function updateTableStatusBadges() {
      officialTableNames.forEach(t => {
        const btn = document.getElementById(`btn-table-${t}`);
        if (!btn) return;
        const hasUnpaidAndCooked = allOrders.some(o => o && o.table === t && o.status === "未結帳" && (o.cook === "已出單" || o.cook === "開單"));
        
        if (t === activeTable) {
          btn.className = "py-3 text-sm font-bold rounded-xl border-2 border-amber-500 bg-amber-500/10 text-amber-400 transition";
        } else if (hasUnpaidAndCooked) {
          btn.className = "py-3 text-sm font-bold rounded-xl border border-rose-500/40 bg-rose-950/20 text-rose-400 hover:bg-rose-900/30 transition";
        } else {
          btn.className = "py-3 text-sm font-bold rounded-xl border border-stone-800 bg-stone-900/40 text-stone-500 hover:border-stone-700 hover:text-stone-300 transition";
        }
      });
    }

    function selectTable(table) {
      activeTable = table;
      updateTableStatusBadges();
      renderTableBill(table);
    }

    // 💰 面板二：結帳明細（大放寬容錯保護）
    function renderTableBill(table) {
      document.getElementById('current-selected-table').textContent = `${table} 桌`;
      const billItemsContainer = document.getElementById('table-bill-items');
      const actionZone = document.getElementById('action-buttons-zone');
      const timeLog = document.getElementById('time-log-display');

      const thisTableRows = allOrders.filter(o => o && o.table === table && o.status !== "已取消");
      
      // 👑 容錯放寬：只要大腦沒有被標記為「已結帳」，且吧台不是「未出單」，通通抓進來算錢
      const unpaidAndCookedRows = thisTableRows.filter(o => o.status !== "已結帳" && o.cook !== "未出單");
      const paidRows = thisTableRows.filter(o => o.status === "橫結帳" || o.status === "已結帳");

      if (thisTableRows.length === 0) {
        billItemsContainer.innerHTML = `<p class="text-stone-600 italic text-center py-12">該桌今晚尚無任何點餐消費紀錄。</p>`;
        document.getElementById('table-bill-total').textContent = "NT$ 0";
        document.getElementById('billing-status-badge').className = "text-xs px-2 py-0.5 rounded-full bg-stone-800 text-stone-500";
        document.getElementById('billing-status-badge').textContent = "無開單";
        actionZone.innerHTML = `<button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">現金收款結帳</button><button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">招待 Bye-bye Shot</button>`;
        timeLog.textContent = "";
        return;
      }

      if (unpaidAndCookedRows.length > 0) {
        let totalSum = 0;
        let htmlContent = `<div class="space-y-2">`;
        
        unpaidAndCookedRows.forEach(o => {
          let price = parseInt(o.total.replace(/[^0-9]/g, '')) || 0;
          totalSum += price;
          htmlContent += `
            <div class="flex justify-between items-center bg-stone-900 p-2.5 rounded-lg border border-stone-800/60">
              <div>
                <p class="font-bold text-stone-200">${o.item || "未知品項"}</p>
                <p class="text-[11px] text-stone-500">點單時間: ${o.time ? (o.time.includes(' ') ? o.time.split(' ')[1] : o.time) : "未知"} <span class="text-green-400 font-bold ml-1">✓已出單</span></p>
              </div>
              <span class="font-mono text-amber-500">NT$ ${price}</span>
            </div>`;
        });
        
        const makingCount = thisTableRows.filter(o => o.status !== "已結帳" && o.cook === "未出單").length;
        if (makingCount > 0) {
          htmlContent += `<p class="text-xs text-amber-600 italic text-center pt-2">⚠️ 提示：吧台尚有 ${makingCount} 筆餐點製作中，尚未出單不計入此帳單。</p>`;
        }
        
        htmlContent += `</div>`;
        
        billItemsContainer.innerHTML = htmlContent;
        document.getElementById('table-bill-total').textContent = `NT$ ${totalSum.toLocaleString()}`;
        document.getElementById('billing-status-badge').className = "text-xs px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 font-bold";
        document.getElementById('billing-status-badge').textContent = "有酒水已出單";

        const rowIndices = unpaidAndCookedRows.map(o => o.row).join(',');
        actionZone.innerHTML = `
          <button onclick="batchPay('${rowIndices}')" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-stone-950 font-black rounded-xl transition text-sm">💰 現金收款結帳</button>
          <button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">招待 Bye-bye Shot</button>
        `;
        timeLog.textContent = "";

      } else if (thisTableRows.some(o => o.status !== "已結帳" && o.cook === "未出單")) {
        const pendingItems = thisTableRows.filter(o => o.status !== "已結帳" && o.cook === "未出單");
        billItemsContainer.innerHTML = `
          <div class="py-8 text-center space-y-2">
            <p class="text-amber-500 font-bold text-sm">⏳ 餐點製作中，尚未出單</p>
            <p class="text-xs text-stone-500 max-w-xs mx-auto">請先至「📋 出單現況總覽」打勾出單，品項才會流進結帳明細算錢喔！</p>
          </div>`;
        document.getElementById('table-bill-total').textContent = "NT$ 0";
        document.getElementById('billing-status-badge').className = "text-xs px-2 py-0.5 rounded-full bg-stone-800 text-amber-600";
        document.getElementById('billing-status-badge').textContent = "等待吧台出單";
        actionZone.innerHTML = `<button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">等待出單後解鎖</button><button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">招待 Bye-bye Shot</button>`;
        timeLog.textContent = "";
      } else {
        // 【全部已結清狀態】
        let totalSum = 0;
        let htmlContent = `<div class="opacity-50 space-y-2">`;
        let lastPayTime = "";
        let isShotGiven = false;
        let lastRowIndex = thisTableRows.length > 0 ? thisTableRows[thisTableRows.length - 1].row : 2;

        thisTableRows.forEach(o => {
          let price = parseInt(o.total.replace(/[^0-9]/g, '')) || 0;
          totalSum += price;
          if (o.payTime) lastPayTime = o.payTime;
          if (o.shot && o.shot.includes("已請")) isShotGiven = true;
          
          htmlContent += `
            <div class="flex justify-between items-center bg-stone-950 p-2.5 rounded-lg">
              <p class="text-stone-400 line-through">${o.item || "未知品項"} (已出已清)</p>
              <span class="font-mono text-stone-500">NT$ ${price}</span>
            </div>`;
        });
        htmlContent += `</div>`;

        billItemsContainer.innerHTML = htmlContent;
        document.getElementById('table-bill-total').textContent = `NT$ ${totalSum.toLocaleString()}`;
        document.getElementById('billing-status-badge').className = "text-xs px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 font-bold";
        document.getElementById('billing-status-badge').textContent = "🟢 本次已結清";

        let now = new Date();
        let fallbackTime = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0') + "-" + String(now.getDate()).padStart(2,'0') + " " + String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0') + ":" + String(now.getSeconds()).padStart(2,'0');

        actionZone.innerHTML = `
          <button disabled class="w-full py-3 bg-stone-800 text-stone-600 font-bold rounded-xl cursor-not-allowed text-sm">💰 結帳完畢</button>
          <button onclick="giveByeByeShot(${lastRowIndex})" id="shot-btn" ${isShotGiven ? 'disabled' : ''} 
                  class="w-full py-3 text-sm font-bold rounded-xl transition ${isShotGiven ? 'bg-pink-950/30 border border-pink-900/50 text-pink-500/70 cursor-not-allowed' : 'bg-pink-600 hover:bg-pink-700 text-white'}">
            ${isShotGiven ? '🥃 已送人情 Bye-bye Shot' : '✨ 招待 Bye-bye Shot'}
          </button>
        `;
        timeLog.textContent = `⏱ 結帳時間紀錄：${lastPayTime || fallbackTime}`;
      }
    }

    // ⚡ 完美並行管線：點擊瞬間強刷畫面狀態，100% 絕對變色
    function batchPay(rowStr) {
      const rows = rowStr.split(',');
      
      // 🏎️ 樂觀渲染升級：點下去那一毫秒，直接把當前桌的所有明細就地蓋章變成已結帳！
      allOrders.forEach(o => {
        if (o && o.table === activeTable) {
          o.status = "已結帳";
        }
      });
      // 🏎️ 直接原地強制重新渲染，不等任何非同步請求，徹底粉碎卡頓
      renderTableBill(activeTable);
      updateTableStatusBadges();

      // 背景慢慢上傳給 Google 大腦
      const tasks = rows.map(row => 
        fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "updateStatus", row: parseInt(row), type: "payment", value: "已結帳" })
        })
      );

      Promise.all(tasks)
        .then(() => { refreshData(); })
        .catch(e => { console.error("背景結帳略有延遲:", e); });
    }

    async function giveByeByeShot(row) {
      const btn = document.getElementById('shot-btn');
      if (btn) {
        btn.disabled = true;
        btn.innerText = "🥃 已送人情 Bye-bye Shot";
        btn.className = "w-full py-3 text-sm font-bold rounded-xl transition bg-pink-950/30 border border-pink-900/50 text-pink-500/70 cursor-not-allowed";
      }
      allOrders.forEach(o => { if (o && o.row === row) o.shot = "已請Bye-bye Shot"; });
      
      await changeStatus(row, 'byebye_shot', '已請');
      refreshData();
    }

    async function cancelSingleOrder(row) {
      if (!confirm("⚠️ 吧台安全警告：確定要取消並作廢這筆點餐嗎？")) return;
      
      const card = document.getElementById(`kds-card-${row}`);
      if (card) {
        card.style.opacity = "0";
        card.style.transform = "scale(0.9)";
        setTimeout(() => card.remove(), 200);
      }
      allOrders = allOrders.filter(o => o && o.row !== row);

      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "updateStatus", row: row, type: "cancel_order", value: "已取消" })
        });
        refreshData();
      } catch (e) { console.error("取消失敗:", e); }
    }

    async function changeStatus(row, type, value) {
      if (type === 'cook_status' && value === '已出單') {
        const card = document.getElementById(`kds-card-${row}`);
        if (card) {
          card.style.opacity = "0";
          card.style.transform = "scale(0.9)";
          setTimeout(() => card.remove(), 200);
        }
        allOrders.forEach(o => { if (o && o.row === row) o.cook = "Pednding出單"; o.cook = "已出單"; });
      }

      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors", 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "updateStatus", row: row, type: type, value: value })
        });
        refreshData();
      } catch (e) { console.error("更新失敗:", e); }
    }

    setInterval(refreshData, 3000);
    initTableButtons();
    refreshData();
  </script>
</body>
</html>
