<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See Ya Bar - 吧台智慧決策後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f0805, #24140d); color: #e5e7eb; font-family: sans-serif; }
    .neon-border { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.4); }
    .neon-text-green { text-shadow: 0 0 8px rgba(74, 222, 128, 0.6); }
  </style>
</head>
<body class="p-6 min-h-screen">

  <!-- 聲音晶片：清脆明亮的黃金接單提示音 -->
  <audio id="bellSound" preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mp3">
  </audio>

  <!-- 頂部吧台數據儀表板 -->
  <header class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-stone-900/80 p-4 rounded-2xl border border-amber-900/30">
      <h1 class="text-xl font-bold text-amber-400 tracking-wider">🍹 See Ya Bar 後台</h1>
      <button id="startSoundBtn" class="mt-2 w-full bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold py-1.5 px-3 rounded-lg transition">🔊 啟用吧台即時鈴聲</button>
    </div>
    <div class="bg-stone-900/80 p-4 rounded-2xl border border-stone-800">
      <p class="text-xs text-gray-400">今日總營業額</p>
      <p id="total-revenue" class="text-2xl font-black text-green-400 neon-text-green">NT$ 0</p>
    </div>
    <div class="bg-stone-900/80 p-4 rounded-2xl border border-stone-800">
      <p class="text-xs text-gray-400">當前未結帳桌數</p>
      <p id="unpaid-tables" class="text-2xl font-black text-amber-400">0 桌</p>
    </div>
    <div class="bg-stone-900/80 p-4 rounded-2xl border border-stone-800">
      <p class="text-xs text-gray-400">今晚公關招待 Shot</p>
      <p id="total-shots" class="text-2xl font-black text-pink-400">0 杯</p>
    </div>
  </header>

  <!-- 主工作區：未結帳訂單 KDS 螢幕 -->
  <main>
    <h2 class="text-lg font-bold text-amber-200 mb-4 flex items-center gap-2">📋 吧台即時動態監控</h2>
    <div id="orders-grid" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <div class="text-gray-500 italic text-sm">正在從 Google Sheet 載入微醺數據...</div>
    </div>
  </main>

  <script>
    // ⚠️ 請精準替換成你剛剛在 Google Apps Script 複製的 Web App 網址！
    const API_URL = "https://script.google.com/macros/s/AKfycbyf2aQgkaeLuzpONrc3RzegFMRqXtfgucDMhXs_sXxBH4J2YnqUXr4GgnIB7LV2JO_N8A/exec";

    let localOrdersCount = 0;
    let soundEnabled = false;
    const bell = document.getElementById('bellSound');

    // 解鎖瀏覽器高分貝鈴聲按鈕
    document.getElementById('startSoundBtn').addEventListener('click', async function() {
      try {
        await bell.play(); bell.pause(); bell.currentTime = 0;
        soundEnabled = true;
        this.textContent = "🟢 鈴聲全自動監聽中";
        this.className = "mt-2 w-full bg-green-700 text-white text-xs font-bold py-1.5 px-3 rounded-lg cursor-not-allowed";
      } catch (e) { alert("解鎖失敗，請再按一次！"); }
    });

    async function fetchOrders() {
      try {
        const res = await fetch(API_URL);
        const orders = await res.json();
        renderDashboard(orders);
      } catch (err) { console.error("讀取後台失敗:", err); }
    }

    function renderDashboard(orders) {
      const grid = document.getElementById('orders-grid');
      
      // 1. 計算統計數據
      let revenue = 0;
      let unpaidRows = 0;
      let shotCount = 0;
      
      orders.forEach(o => {
        let amt = parseInt(o.total.replace(/[^0-9]/g, '')) || 0;
        if (o.status === "已結帳") revenue += amt;
        if (o.status === "未結帳") unpaidRows++;
        if (o.shot === "已請") shotCount++;
      });

      document.getElementById('total-revenue').textContent = `NT$ ${revenue.toLocaleString()}`;
      document.getElementById('unpaid-tables').textContent = `${unpaidRows} 筆`;
      document.getElementById('total-shots').textContent = `${shotCount} 杯`;

      // 2. 檢查是否有全新訂單進來（若當前總筆數大於本地紀錄，且非首次載入，就大聲響鈴！）
      if (orders.length > localOrdersCount) {
        if (localOrdersCount !== 0 && soundEnabled) {
          bell.currentTime = 0;
          bell.play().catch(c => console.log(c));
        }
        localOrdersCount = orders.length;
      }

      // 3. 渲染訂單卡片（只顯示未結帳的，作為吧台即時工作板）
      const activeOrders = orders.filter(o => o.status === "未結帳");
      if(activeOrders.length === 0) {
        grid.innerHTML = `<div class="text-gray-500 italic text-sm p-4 col-span-3">目前吧台全數出單完畢，等待新客人點餐中...🥂</div>`;
        return;
      }

      grid.innerHTML = activeOrders.map(o => `
        <div class="bg-stone-900/90 rounded-2xl p-5 space-y-4 neon-border border-amber-500/20 transition-all duration-300">
          <div class="flex justify-between items-center border-b border-amber-900/20 pb-3">
            <span class="bg-amber-500/20 text-amber-400 font-bold px-3 py-1 rounded-xl text-sm">📍 ${o.table}</span>
            <span class="text-xs text-gray-500">${o.time.split(' ')[1] || o.time}</span>
          </div>
          
          <div class="text-lg font-bold text-gray-100 tracking-wide">${o.item}</div>
          <div class="text-sm text-gray-400">消費金額：<span class="text-amber-500 font-bold">NT$ ${o.total}</span></div>
          
          <!-- 核心吧台延伸功能按鈕 -->
          <div class="grid grid-cols-2 gap-2 pt-2 border-t border-stone-800 text-xs">
            <button onclick="updateBackend(${o.row}, 'shot', '${o.shot === '已請' ? '無' : '已請'}')" 
                    class="py-2 rounded-xl border transition ${o.shot === '已請' ? 'bg-pink-900/40 border-pink-500 text-pink-300' : 'bg-stone-800 border-stone-700 text-gray-400 hover:bg-pink-950/40'}">
              ${o.shot === '已請' ? '🥃 已招待熟客 Shot' : '➕ 招待公關 Shot'}
            </button>
            <button onclick="updateBackend(${o.row}, 'payment', '已結帳')" 
                    class="py-2 rounded-xl bg-amber-600 hover:bg-green-700 text-white font-bold transition">
              💰 收款結帳
            </button>
          </div>
        </div>
      `).join('');
    }

    async function updateBackend(row, type, value) {
      try {
        // 秒改前端畫面提升吧台手體驗，同時發送給 Google 大腦同步
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "updateStatus", row: row, type: type, value: value })
        });
        fetchOrders(); // 重新整理同步最新數據
      } catch (e) { alert("吧台網絡超時，請重試！"); }
    }

    // 每 3 秒鐘鋼鐵巡邏 Google Sheet
    setInterval(fetchOrders, 3000);
    fetchOrders();
  </script>
</body>
</html>
